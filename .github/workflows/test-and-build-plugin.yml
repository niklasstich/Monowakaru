name: Test and build plugin
on: [push]

env:
  dotnet-version: '10.0.x'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup dotnet ${{ env.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.dotnet-version }}
      - name: Restore
        run: dotnet restore Monowakaru.slnx
      - name: Build
        run: dotnet build --no-restore Monowakaru.slnx
      - name: Test
        run: dotnet test --no-build Monowakaru.slnx